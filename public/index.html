<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SyncBoard - Pizarra Colaborativa</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="toolbar glass-panel">
        <div class="tool-group">
            <input type="color" id="color-picker" value="#00f0ff" title="Color del Pincel">
            <input type="range" id="size-slider" min="1" max="50" value="5" title="Tamaño del Pincel">
        </div>
        <div class="tool-group">
            <button id="btn-pencil" class="tool-btn active">✏️ Lápiz</button>
            <button id="btn-eraser" class="tool-btn">🧽 Borrador</button>
            <button id="btn-clear" class="tool-btn danger">🗑️ Limpiar Todo</button>
        </div>
        <div class="status">
            <span class="status-dot" id="status-dot"></span>
            <span id="status-text">Conectando...</span>
        </div>
    </div>
    
    <canvas id="whiteboard"></canvas>

    <!-- Cargamos la librería cliente de Socket.io que nuestro servidor expondrá automáticamente -->
    <script src="/socket.io/socket.io.js"></script>
    <script src="app.js"></script>
</body>
</html>
